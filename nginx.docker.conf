# ═══════════════════════════════════════════════════════════════
# KrishiMitra AI — Nginx Configuration v2.1
# Serves: SPA frontend + Django API + Django admin + static files
# ═══════════════════════════════════════════════════════════════

upstream django_api {
    server web:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options          "DENY"            always;
    add_header X-Content-Type-Options   "nosniff"         always;
    add_header X-XSS-Protection         "1; mode=block"   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=*"   always;

    # ── Upload size (crop/leaf images for KrishiRaksha) ───────
    client_max_body_size 15M;

    # ── Gzip compression ──────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-font-ttf
        font/opentype
        image/svg+xml;

    # ── Django static files (admin, DRF, WhiteNoise) ─────────
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Media uploads ─────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── API: all /api/* → Django ──────────────────────────────
    location /api/ {
        proxy_pass         http://django_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;
    }

    # ── Django Admin ──────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://django_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API docs (Swagger / ReDoc) ────────────────────────────
    location ~ ^/(api/schema|api/docs|api/redoc) {
        proxy_pass         http://django_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend SPA (Vite build) ─────────────────────────────
    # Serve index.html for all non-API routes → Vue/React router handles it
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        # Cache built assets indefinitely (they have content hashes in filename)
        location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        # HTML always re-checked (no stale SPA shell)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
        try_files $uri $uri/ /index.html;
    }

    # ── Health endpoint passthrough (for load balancers) ──────
    location = /health {
        proxy_pass         http://django_api/api/health/;
        proxy_set_header   Host $host;
        access_log         off;
    }
}
