name: KrishiMitra CD — Deploy to Production

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never cancel a running deploy

jobs:

  # ── Pre-deploy gate: ensure CI passed ───────────────────────
  pre-deploy-check:
    name: 🔒 Pre-deploy check
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI workflow passed
        run: echo "Deploy triggered by ${{ github.actor }} on ${{ github.ref_name }}"

  # ── Deploy to Render ─────────────────────────────────────────
  deploy-render:
    name: 🚀 Deploy → Render
    runs-on: ubuntu-latest
    needs: pre-deploy-check
    if: ${{ vars.DEPLOY_TARGET == 'render' || vars.DEPLOY_TARGET == '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          echo "🚀 Triggering Render deploy..."
          STATUS=$(curl -s -o /tmp/render_response.json -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json")
          echo "HTTP status: $STATUS"
          cat /tmp/render_response.json || true
          if [ "$STATUS" -ge 400 ]; then
            echo "❌ Render deploy hook failed with status $STATUS"
            exit 1
          fi
          echo "✅ Render deploy triggered"

      - name: Skip (no hook configured)
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL == '' }}
        run: |
          echo "⚠️  RENDER_DEPLOY_HOOK_URL secret not set — skipping Render deploy"
          echo "Add it: GitHub → Settings → Secrets → RENDER_DEPLOY_HOOK_URL"

  # ── Deploy to Railway (alternative) ─────────────────────────
  deploy-railway:
    name: 🚀 Deploy → Railway
    runs-on: ubuntu-latest
    needs: pre-deploy-check
    if: ${{ vars.DEPLOY_TARGET == 'railway' }}

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Railway deploy
        if: ${{ secrets.RAILWAY_TOKEN != '' }}
        run: |
          npm install -g @railway/cli --silent
          railway up --service krishimitra-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Docker Hub publish (optional) ───────────────────────────
  publish-docker:
    name: 🐳 Publish Docker Image
    runs-on: ubuntu-latest
    needs: pre-deploy-check
    if: ${{ vars.PUBLISH_DOCKER == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/krishimitra-ai:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/krishimitra-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy summary ───────────────────────────────────────────
  deploy-summary:
    name: 📋 Deploy Summary
    runs-on: ubuntu-latest
    needs: [deploy-render]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "══════════════════════════════════════════════"
          echo "  KrishiMitra AI — Deployment Summary"
          echo "══════════════════════════════════════════════"
          echo "  Branch:      ${{ github.ref_name }}"
          echo "  Commit:      ${{ github.sha }}"
          echo "  Author:      ${{ github.actor }}"
          echo "  Time (UTC):  $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "  Environment: ${{ inputs.environment || 'production' }}"
          echo "══════════════════════════════════════════════"
          echo ""
          echo "  Services deployed:"
          echo "  ✅ 20 API routes"
          echo "  ✅ 150+ crops · 22 languages · 126 districts"
          echo "  ✅ 19-intent NLP chatbot (irrigation/sowing/harvest/storage/organic/seed/insurance/profit)"
          echo "  ✅ Real-time: Open-Meteo + Agmarknet Direct API"
          echo "  ✅ Field-level IoT sensor advisory"
          echo "  ✅ Disease→Chat bridge (ML photo diagnosis)"
          echo "  ✅ Hinglish + all 22 Indian language normalisation"
          echo "══════════════════════════════════════════════"

# ─── Secret / Variable Setup ────────────────────────────────────
# GitHub → Settings → Secrets → Actions:
#   RENDER_DEPLOY_HOOK_URL  : From Render service → Settings → Deploy Hook
#   RAILWAY_TOKEN           : From Railway dashboard (for Railway deploys)
#   DOCKERHUB_USERNAME      : Your Docker Hub username (for image publish)
#   DOCKERHUB_TOKEN         : Docker Hub access token
#
# GitHub → Settings → Variables → Actions:
#   DEPLOY_TARGET           : render | railway  (default: render)
#   PUBLISH_DOCKER          : true | false      (default: false)
