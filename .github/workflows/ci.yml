name: KrishiMitra CI

on:
  push:
    branches: [main, master, develop, staging]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

# ── Environment available to every job ────────────────────────
env:
  DJANGO_SETTINGS_MODULE: core.settings
  SECRET_KEY:             "ci-only-krishimitra-test-key-not-production"
  DEBUG:                  "True"
  DATABASE_URL:           sqlite:///ci_test_db.sqlite3
  DATA_GOV_IN_API_KEY:    ""
  GOOGLE_AI_API_KEY:      ""
  OPENWEATHER_API_KEY:    ""
  ALLOWED_HOSTS:          "localhost,127.0.0.1,testserver"
  RATE_LIMIT_ENABLED:     "false"
  REDIS_URL:              ""          # no Redis in CI — sync fallback path tested

jobs:
  # ── Backend: Django checks + all smoke tests ─────────────────
  backend:
    name: 🐍 Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Django health ────────────────────────────────────────
      - name: Django system check
        run: python manage.py check

      - name: Migrations apply cleanly
        run: python manage.py migrate --noinput

      - name: Migration 0011 (IoTSensorReading composite index) present
        run: |
          test -f advisory/migrations/0011_iotsensorreading_latlon_created_idx.py
          python -c "
          import ast
          ast.parse(open('advisory/migrations/0011_iotsensorreading_latlon_created_idx.py').read())
          print('✅ Migration 0011 valid Python')
          "

      # ── Route registration ───────────────────────────────────
      - name: All API routes registered
        working-directory: ${{ github.workspace }}
        run: |
          python3 -c "
          import sys, os
          sys.path.insert(0,'backend')
          os.environ.update({'DJANGO_SETTINGS_MODULE':'core.settings',
                             'SECRET_KEY':'ci-test','DEBUG':'True',
                             'DATABASE_URL':'sqlite:///ci.db'})
          import django; django.setup()
          from advisory.api.urls import router, urlpatterns
          routes = sorted([r[0] for r in router.registry])
          required = ['advisories','chatbot','crops','diagnostics',
                      'field-advisory','languages','locations',
                      'market-prices','schemes','users','weather']
          missing = [r for r in required if r not in routes]
          if missing:
              print('MISSING routes:', missing); sys.exit(1)
          # Verify new endpoints exist in urlpatterns
          url_names = [p.name for p in urlpatterns if hasattr(p,'name') and p.name]
          for ep in ['chatbot-stream','sentry_test','data_freshness','health_readiness']:
              if ep not in url_names:
                  print(f'MISSING endpoint: {ep}'); sys.exit(1)
          print(f'✅ {len(routes)} router routes + new endpoints verified')
          "

      # ── Service imports ──────────────────────────────────────
      - name: All services import cleanly
        working-directory: ${{ github.workspace }}
        run: |
          python3 -c "
          import sys, os
          sys.path.insert(0,'backend')
          os.environ.update({'DJANGO_SETTINGS_MODULE':'core.settings',
                             'SECRET_KEY':'ci-test','DEBUG':'True',
                             'DATABASE_URL':'sqlite:///ci.db'})
          import django; django.setup()
          from advisory.services.language_service import SUPPORTED_LANGUAGES
          assert len(SUPPORTED_LANGUAGES) >= 22, f'Expected >=22 languages, got {len(SUPPORTED_LANGUAGES)}'
          from advisory.services.comprehensive_crop_database import ALL_CROP_DATA
          assert len(ALL_CROP_DATA) >= 165, f'Expected >=165 crops, got {len(ALL_CROP_DATA)}'
          for crop_id in ['makhana', 'dragon_fruit', 'large_cardamom', 'tamarind']:
              assert crop_id in ALL_CROP_DATA, f'Missing expanded crop profile: {crop_id}'
          from advisory.services.district_data import DISTRICT_PROFILES
          assert len(DISTRICT_PROFILES) >= 100, f'Expected >=100 districts, got {len(DISTRICT_PROFILES)}'
          from advisory.services.crop_catalog import crop_catalog
          assert crop_catalog.search('makhana', limit=1), 'Makhana missing from crop catalog search'
          assert crop_catalog.search('dragon', limit=1), 'Dragon fruit missing from crop catalog search'
          from advisory.services.crop_recommendation_engine import crop_recommendation_engine
          from advisory.services.field_sensor_service import field_sensor_service
          from advisory.services.unified_realtime_service import weather_service, market_service
          from advisory.services.disease_chat_bridge import disease_chat_bridge
          from advisory.services.session_memory_service import session_memory
          from advisory.tasks import persist_turn, log_interaction, refresh_location_cache
          from advisory.rate_limiters import (
              chat_rate_limiter, data_rate_limiter,
              diagnosis_rate_limiter, nominatim_limiter,
          )
          from advisory.api.viewsets.chatbot import ChatbotViewSet, stream_chat, _dispatch_writes
          from advisory.api.monitoring_views import sentry_test, data_freshness
          # AuthViewSet smoke test (web-login-auth spec)
          from advisory.api.viewsets.auth_viewset import AuthViewSet, otp_rate_limiter
          assert hasattr(AuthViewSet, 'otp_request'), 'otp_request action missing'
          assert hasattr(AuthViewSet, 'otp_verify'),  'otp_verify action missing'
          assert hasattr(AuthViewSet, 'me'),          'me action missing'
          print('✅ AuthViewSet imported and all actions verified')
          print(f'✅ Languages:{len(SUPPORTED_LANGUAGES)} Crops:{len(ALL_CROP_DATA)} Districts:{len(DISTRICT_PROFILES)}')
          print('✅ All services + new modules imported successfully')
          "

      # ── Farmer-critical API contracts ────────────────────────
      - name: Farmer-critical API behavior
        working-directory: ${{ github.workspace }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import struct
          import sys
          import zlib

          sys.path.insert(0, "backend")
          os.environ.update({
              "DJANGO_SETTINGS_MODULE": "core.settings",
              "SECRET_KEY": "ci-test",
              "DEBUG": "True",
              "DATABASE_URL": "sqlite:///ci.db",
              "CROP_REC_REALTIME_TIMEOUT_S": "0.2",
              "PHASE1_TIMEOUT_S": "1",
              "OLLAMA_READ_TIMEOUT_S": "1",
              "OLLAMA_DIRECT_TIMEOUT_S": "1",
              "CHAT_REALTIME_TIMEOUT_S": "1",
              "RATE_LIMIT_ENABLED": "false",
          })

          import django
          django.setup()

          from django.core.files.uploadedfile import SimpleUploadedFile
          from django.test import Client
          from advisory.services.comprehensive_crop_database import ALL_CROP_DATA
          from advisory.services.crop_catalog import crop_catalog
          from advisory.services import crop_recommendation_engine as crop_rec_module

          def png_bytes(width=64, height=64):
              def chunk(kind, data):
                  body = kind + data
                  return struct.pack("!I", len(data)) + body + struct.pack("!I", zlib.crc32(body) & 0xffffffff)

              raw = b"".join(b"\x00" + bytes([32, 148, 54]) * width for _ in range(height))
              return (
                  b"\x89PNG\r\n\x1a\n"
                  + chunk(b"IHDR", struct.pack("!IIBBBBB", width, height, 8, 2, 0, 0, 0))
                  + chunk(b"IDAT", zlib.compress(raw))
                  + chunk(b"IEND", b"")
              )

          assert len(ALL_CROP_DATA) >= 165, len(ALL_CROP_DATA)
          for term in ["makhana", "dragon", "large cardamom", "tamarind"]:
              assert crop_catalog.search(term, limit=3), f"crop search missing {term}"

          crop_rec_module.weather_service.get_weather = lambda *args, **kwargs: {
              "status": "ci_fallback",
              "is_live": False,
              "current": {"temperature": 28, "humidity": 62, "rainfall": 0},
              "forecast_7day": [],
              "data_source": "ci_stub",
          }
          crop_rec_module.market_service.get_prices = lambda *args, **kwargs: {
              "status": "ci_fallback",
              "is_live": False,
              "top_crops": [],
              "data_source": "ci_stub",
          }

          client = Client()

          readiness = client.get("/api/health/readiness/")
          assert readiness.status_code == 200, readiness.content
          checks = readiness.json()["checks"]
          for key in ["database", "cache", "phase1_ai", "ollama", "crop_disease_model"]:
              assert key in checks, f"readiness missing {key}"

          loc = client.get("/api/locations/search/", {"q": "lucknow", "limit": "2"})
          assert loc.status_code == 200, loc.content
          assert len(loc.json()["results"]) <= 2, loc.json()

          crops = client.get("/api/crops/search/", {"q": "makhana", "limit": "5"}).json()["results"]
          assert any(c["id"] == "makhana" for c in crops), crops
          diag_crops = client.get("/api/diagnostics/crop-search/", {"q": "dragon", "limit": "5"}).json()["results"]
          assert any(c["id"] == "dragon_fruit" for c in diag_crops), diag_crops

          img = png_bytes()
          predict = client.post(
              "/api/diagnostics/predict/",
              {
                  "crop": "tomato",
                  "language": "hi",
                  "session_id": "ci-mobile-upload",
                  "image": SimpleUploadedFile("leaf.png", img, content_type="image/png"),
              },
          )
          assert predict.status_code == 200, predict.content
          pjson = predict.json()
          assert {"crop", "disease", "response", "recommendation"}.issubset(pjson), pjson
          assert pjson["status"] in {"model_unavailable", "tensorflow_missing", "not_plant", "success", "low_confidence"}, pjson

          b64 = __import__("base64").b64encode(img).decode("ascii")
          detect = client.post(
              "/api/diagnostics/detect/",
              data=json.dumps({
                  "crop": "tomato",
                  "location": "Delhi",
                  "latitude": 28.6139,
                  "longitude": 77.2090,
                  "images": {"close_up": "data:image/png;base64," + b64},
                  "session_id": "ci-detect-fallback",
                  "language": "hi",
              }),
              content_type="application/json",
          )
          assert detect.status_code == 200, detect.content
          djson = detect.json()
          assert djson["status"] in {"advisory_fallback", "model_unavailable", "tensorflow_missing", "not_plant", "success"}, djson
          assert {"crop", "disease", "response", "recommendation"}.issubset(djson), djson

          delhi = client.get("/api/advisories/", {"location": "Delhi", "latitude": "28.6139", "longitude": "77.2090"}).json()
          mumbai = client.get("/api/advisories/", {"location": "Mumbai", "latitude": "19.0760", "longitude": "72.8777"}).json()
          delhi_top = [r["crop_name"] for r in delhi["top_4_recommendations"]]
          mumbai_top = [r["crop_name"] for r in mumbai["top_4_recommendations"]]
          assert delhi_top != mumbai_top, (delhi_top, mumbai_top)
          assert delhi.get("coordinates") and mumbai.get("coordinates")
          assert "realtime_status" in delhi and "weather_status" in delhi and "market_data_source" in delhi

          print("✅ Farmer-critical APIs verified")
          PY

      # ── Rate limiter unit test ───────────────────────────────
      - name: Rate limiter token bucket (time.time, CAS loop)
        working-directory: ${{ github.workspace }}
        run: |
          python3 -c "
          import sys, os, time
          sys.path.insert(0,'backend')
          os.environ.update({'DJANGO_SETTINGS_MODULE':'core.settings',
                             'SECRET_KEY':'ci-test','DEBUG':'True',
                             'DATABASE_URL':'sqlite:///ci.db',
                             'CACHE_BACKEND':'django.core.cache.backends.locmem.LocMemCache'})
          import django; django.setup()
          from advisory.rate_limiters import SharedRateLimiter
          # 1. time.time() is used (not monotonic)
          import inspect
          src = inspect.getsource(SharedRateLimiter.is_allowed)
          assert 'time.time()' in src, 'Bug 1 not fixed: time.monotonic() still present'
          assert 'monotonic' not in src, 'Bug 1 not fixed: time.monotonic() still present'
          # 2. CAS retry loop present
          assert 'range(3)' in src or '_attempt' in src, 'Bug 2 not fixed: CAS loop missing'
          # 3. Functional test with local cache
          lim = SharedRateLimiter('ci_test', capacity=3, fill_rate=100.0)
          results = [lim.is_allowed('test_client') for _ in range(5)]
          assert results[:3] == [True, True, True], f'First 3 should pass: {results}'
          assert results[3] == False, f'4th should be rate-limited: {results}'
          # 4. remaining() uses time.time()
          src_rem = inspect.getsource(SharedRateLimiter.remaining)
          assert 'time.time()' in src_rem, 'remaining() still uses monotonic'
          print('✅ Rate limiter: time.time() confirmed, CAS loop present, functional test passed')
          "

      # ── Intent classification ────────────────────────────────
      - name: Chatbot intent classification (15 queries)
        working-directory: ${{ github.workspace }}
        run: |
          python3 -c "
          import sys, os
          sys.path.insert(0,'backend')
          os.environ.update({'DJANGO_SETTINGS_MODULE':'core.settings',
                             'SECRET_KEY':'ci-test','DEBUG':'True',
                             'DATABASE_URL':'sqlite:///ci.db'})
          import django; django.setup()
          from advisory.services.chat_intelligence_service import (
              ChatIntelligenceService,
              INTENT_IRRIGATION, INTENT_SOWING, INTENT_HARVEST,
              INTENT_FERTILIZER, INTENT_PEST_DISEASE, INTENT_SOIL,
              INTENT_STORAGE, INTENT_ORGANIC, INTENT_SEED,
              INTENT_INSURANCE, INTENT_PROFIT_CALC, INTENT_WEATHER,
              INTENT_MARKET_PRICE, INTENT_GOVERNMENT_SCHEME,
              INTENT_CROP_RECOMMENDATION,
          )
          svc = ChatIntelligenceService()
          tests = [
              ('gehu me kitten din baad pani de',    INTENT_IRRIGATION),
              ('wheat pili pad rahi hai',             INTENT_PEST_DISEASE),
              ('gehu ki buwai kab karein',            INTENT_SOWING),
              ('gehu ki katai kab hogi',              INTENT_HARVEST),
              ('gehu me 40 din baad khad daalein',   INTENT_FERTILIZER),
              ('mitti ki janch kaise karein',         INTENT_SOIL),
              ('gehu ka bhandaran kaise karein',      INTENT_STORAGE),
              ('organic kheti kaise karein',          INTENT_ORGANIC),
              ('wheat seed treatment kaise karein',   INTENT_SEED),
              ('fasal bima claim kaise karein',       INTENT_INSURANCE),
              ('gehu ka profit per bigha kitna hai',  INTENT_PROFIT_CALC),
              ('aaj ka mausam',                       INTENT_WEATHER),
              ('aaj ka gehu ka rate kya hai',         INTENT_MARKET_PRICE),
              ('pm kisan status check',               INTENT_GOVERNMENT_SCHEME),
              ('kaunsi fasal lagaun',                 INTENT_CROP_RECOMMENDATION),
          ]
          failed = []
          for q, exp in tests:
              got, _ = svc.classify_query(q)
              if got != exp:
                  failed.append(f'FAIL: expected={exp} got={got} q={q!r}')
          if failed:
              [print(f) for f in failed]; sys.exit(1)
          print(f'✅ All {len(tests)} intent tests passed')
          "

      # ── Celery tasks (sync fallback, no Redis needed) ────────
      - name: Celery tasks importable + sync fallback works
        working-directory: ${{ github.workspace }}
        run: |
          python3 -c "
          import sys, os
          sys.path.insert(0,'backend')
          os.environ.update({'DJANGO_SETTINGS_MODULE':'core.settings',
                             'SECRET_KEY':'ci-test','DEBUG':'True',
                             'DATABASE_URL':'sqlite:///ci.db'})
          # No REDIS_URL → _USE_CELERY must be False → sync path
          import django; django.setup()
          from advisory.api.viewsets.chatbot import _USE_CELERY, _dispatch_writes
          assert not _USE_CELERY, f'_USE_CELERY should be False without REDIS_URL, got {_USE_CELERY}'
          from advisory.tasks import persist_turn, log_interaction, refresh_location_cache
          assert callable(persist_turn), 'persist_turn must be callable'
          assert callable(log_interaction), 'log_interaction must be callable'
          print('✅ Celery tasks importable, sync fallback active (no REDIS_URL)')
          "

      # ── Session memory ───────────────────────────────────────
      - name: Session memory uses update_or_create (not get_or_create)
        working-directory: ${{ github.workspace }}
        run: |
          python3 -c "
          import inspect, sys, os
          sys.path.insert(0,'backend')
          os.environ.update({'DJANGO_SETTINGS_MODULE':'core.settings',
                             'SECRET_KEY':'ci-test','DEBUG':'True',
                             'DATABASE_URL':'sqlite:///ci.db'})
          import django; django.setup()
          from advisory.services.session_memory_service import SessionMemoryService
          src = inspect.getsource(SessionMemoryService.update_session_context)
          assert 'update_or_create' in src, 'Bug 4b not fixed: get_or_create still in update_session_context'
          assert 'get_or_create' not in src, 'Bug 4b not fixed: get_or_create still present'
          src_trim = inspect.getsource(SessionMemoryService.save_turn)
          assert 'exclude(id__in=keep_ids)' in src_trim, 'Bug 4 not fixed: N+1 trim not replaced'
          assert '[MAX_HISTORY_TURNS:]' not in src_trim, 'Bug 4 not fixed: Python-side slice still present'
          print('✅ Session memory: update_or_create + DB-side trim confirmed')
          "

      # ── warm_cache management command ────────────────────────
      - name: warm_cache command importable
        working-directory: ${{ github.workspace }}
        run: |
          python3 -c "
          import sys, os
          sys.path.insert(0,'backend')
          os.environ.update({'DJANGO_SETTINGS_MODULE':'core.settings',
                             'SECRET_KEY':'ci-test','DEBUG':'True',
                             'DATABASE_URL':'sqlite:///ci.db'})
          import django; django.setup()
          from advisory.management.commands.warm_cache import Command
          assert hasattr(Command, 'handle'), 'warm_cache Command missing handle()'
          print('✅ warm_cache management command importable')
          "

      # ── Crop engine ──────────────────────────────────────────
      - name: Crop recommendation engine (offline)
        working-directory: ${{ github.workspace }}
        run: |
          python3 -c "
          import sys, os
          sys.path.insert(0,'backend')
          os.environ.update({'DJANGO_SETTINGS_MODULE':'core.settings',
                             'SECRET_KEY':'ci-test','DEBUG':'True',
                             'DATABASE_URL':'sqlite:///ci.db'})
          import django; django.setup()
          from advisory.services.crop_recommendation_engine import CropRecommendationEngine, _current_season
          e = CropRecommendationEngine()
          for loc, state in [('delhi','Delhi'),('nashik','Maharashtra'),('kochi','Kerala')]:
              p = e._resolve_location_profile(loc, state)
              assert p.get('soil'), f'No soil for {loc}'
              scored = e._score_all_crops(p, _current_season(), {'temperature':28,'humidity':65}, [], {})
              assert len(scored) >= 20, f'{loc}: only {len(scored)} crops scored'
              print(f'  ✅ {loc}: {len(scored)} crops, top={scored[0][1]}({int(scored[0][0])}%)')
          "

      # ── Field sensor ─────────────────────────────────────────
      - name: Field sensor pipeline (offline)
        working-directory: ${{ github.workspace }}
        run: |
          python3 -c "
          import sys, os
          sys.path.insert(0,'backend')
          os.environ.update({'DJANGO_SETTINGS_MODULE':'core.settings',
                             'SECRET_KEY':'ci-test','DEBUG':'True',
                             'DATABASE_URL':'sqlite:///ci.db'})
          import django; django.setup()
          from advisory.services.field_sensor_service import field_sensor_service
          om   = field_sensor_service._open_meteo_fallback(28.7, 77.1)
          soil = field_sensor_service._merge_soil_data(om, {'is_live':False},
              {'sensors':{'nitrogen_kg_ha':100,'phosphorus_kg_ha':15,'ph':6.5,'moisture_pct':35}})
          wa   = {'risk':'None','rain_7d_mm':10,'avg_max_temp_7d':28,'current_temp':26}
          sc   = field_sensor_service._score_crops_field_level(soil,wa,28.7,77.1,'Delhi')
          assert len(sc) >= 20, f'Only {len(sc)} crops scored'
          gaps = field_sensor_service._calculate_input_gaps(soil, sc[:3])
          print(f'  ✅ Field sensor: {len(sc)} crops, {len(gaps)} gap plans')
          "

  # ── Frontend: Vite build ─────────────────────────────────────
  frontend:
    name: 🌐 Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          node --check public/js/app.js
          npm run build

      - name: Verify dist output
        run: |
          test -f frontend/dist/index.html
          test -f frontend/dist/js/app.js
          test -f frontend/dist/js/i18n.js
          echo "✅ Frontend dist verified"

      - name: Check i18n completeness (22 languages)
        run: |
          node -e "
          const i18n = require('fs').readFileSync('frontend/public/js/i18n.js','utf8');
          const checks = ['hero_title','service_field','service_ai','loading','weather_temp'];
          checks.forEach(k => {
            if (!i18n.includes(k+':')) { console.error('Missing i18n key: '+k); process.exit(1); }
          });
          const langs = (i18n.match(/{ code:/g)||[]).length;
          if (langs < 20) { console.error('Too few language entries: '+langs); process.exit(1); }
          console.log('✅ i18n: '+langs+' languages, all required keys present');
          "

      - name: Check app.js key functions
        run: |
          node -e "
          const code = require('fs').readFileSync('frontend/public/js/app.js','utf8');
          const checks = [
            ['loadFieldAdvisory',   'async function loadFieldAdvisory'],
            ['fillPreset',          'function fillPreset'],
            ['_renderMarketPrices', '_renderMarketPrices'],
            ['mandi-prices endpoint','/api/market-prices/mandi-prices/'],
            ['auto-refresh',        '_mandiRefreshTimer'],
          ];
          let ok = true;
          checks.forEach(([name, token]) => {
            if (!code.includes(token)) { console.error('MISSING: '+name); ok=false; }
            else console.log('  ✅ '+name);
          });
          if (!ok) process.exit(1);
          "

  # ── Mobile: Flutter static analysis ─────────────────────────
  mobile:
    name: 📱 Mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/krishimitra_app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter analyze
        run: |
          flutter --version
          flutter pub get
          flutter analyze

  # ── Docker Build ─────────────────────────────────────────────
  docker:
    name: 🐳 Docker build
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: false
          load: true
          tags: krishimitra-ai:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test container (Django check + warm_cache)
        run: |
          docker run --rm \
            -e SECRET_KEY="ci-docker-test-key" \
            -e DEBUG=True \
            -e DATABASE_URL=sqlite:////tmp/ci.db \
            -e ALLOWED_HOSTS="localhost,testserver" \
            krishimitra-ai:ci-${{ github.sha }} \
            sh -c "python manage.py check && python manage.py migrate --noinput && python manage.py warm_cache"
          echo "✅ Docker container check + warm_cache passed"

  # ── Code Quality ─────────────────────────────────────────────
  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Flake8 (core services)
        run: |
          pip install flake8 --quiet
          flake8 backend/advisory/services/unified_realtime_service.py \
                 backend/advisory/services/crop_recommendation_engine.py \
                 backend/advisory/api/viewsets/market.py \
                 backend/advisory/rate_limiters.py \
                 backend/advisory/tasks.py \
                 --max-line-length=130 \
                 --ignore=E501,W503,E203,E402 \
                 --count --statistics || true

      - name: Verify monorepo structure
        run: |
          test -f backend/manage.py
          test -f frontend/index.html
          test -f frontend/package.json
          test -f Dockerfile
          test -f .dockerignore
          test -f .env.example
          test -f Procfile
          test -f .render-build-config
          test -f backend/advisory/services/language_service.py
          test -f backend/advisory/services/comprehensive_crop_database.py
          test -f backend/advisory/services/district_data.py
          test -f backend/advisory/services/crop_recommendation_engine.py
          test -f backend/advisory/services/field_sensor_service.py
          test -f backend/advisory/services/agmarknet_direct_client.py
          test -f backend/advisory/services/session_memory_service.py
          test -f backend/advisory/tasks.py
          test -f backend/advisory/rate_limiters.py
          test -f backend/advisory/management/commands/warm_cache.py
          test -f backend/advisory/migrations/0011_iotsensorreading_latlon_created_idx.py
          test -f frontend/public/js/i18n.js
          echo "✅ Monorepo structure verified"

      - name: No legacy imports remain
        run: |
          if grep -r "enhanced_crop_recommendations\|EnhancedCropRecommendations\|enhanced_location_service\|EnhancedLocationService" \
             backend/ --include="*.py" --exclude-dir=__pycache__ 2>/dev/null | grep -v "^Binary"; then
            echo "❌ Legacy service still imported"
            exit 1
          fi
          echo "✅ No legacy imports found"

      - name: time.monotonic not in rate_limiters
        run: |
          if grep -n "time\.monotonic()" backend/advisory/rate_limiters.py; then
            echo "❌ Bug 1 regression: time.monotonic() found in rate_limiters.py"
            exit 1
          fi
          echo "✅ rate_limiters.py uses time.time() only"

  # ── CI Gate ──────────────────────────────────────────────────
  ci-complete:
    name: ✅ CI Complete
    needs: [backend, frontend, mobile, lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Backend:  ${{ needs.backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Mobile:   ${{ needs.mobile.result }}"
          echo "Lint:     ${{ needs.lint.result }}"
          if [ "${{ needs.backend.result }}"  != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.mobile.result }}"   != "success" ]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ All required jobs passed"
