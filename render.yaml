databases:
  - name: agri-advisory-db
    databaseName: agri_advisory
    user: agri_user
    plan: free

services:
  - type: web
    name: agri-advisory-web
    env: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agri-advisory-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATA_GOV_IN_API_KEY
        value: ""
      - key: SENTRY_DSN
        value: ""
      - key: GOOGLE_AI_API_KEY
        value: ""
