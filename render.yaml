databases:
  - name: agri-advisory-db
    databaseName: agri_advisory
    user: agri_user
    plan: free

services:
  - type: web
    name: agri-advisory-web
    env: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agri-advisory-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATA_GOV_IN_API_KEY
        value: ""
      - key: SENTRY_DSN
        value: ""
      - key: GOOGLE_AI_API_KEY
        value: ""
      - key: WHATSAPP_TOKEN
        value: ""
      - key: WHATSAPP_PHONE_ID
        value: ""
      - key: WHATSAPP_VERIFY_TOKEN
        value: "krishimitra-webhook-secret-2025"
      - key: WHATSAPP_APP_SECRET
        value: ""
      - key: TWILIO_ACCOUNT_SID
        value: ""
      - key: TWILIO_AUTH_TOKEN
        value: ""
      - key: TWILIO_FROM_NUMBER
        value: ""
      - key: GROQ_API_KEY
        value: ""
      - key: MQTT_BROKER_HOST
        value: ""
      - key: MQTT_BROKER_PORT
        value: "1883"
      - key: MQTT_USERNAME
        value: ""
      - key: MQTT_PASSWORD
        value: ""
      - key: MQTT_TOPIC_PREFIX
        value: "krishimitra/farm"
      - key: MQTT_CLIENT_ID
        value: "krishimitra-backend-web"

  - type: worker
    name: agri-advisory-mqtt-worker
    env: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py run_mqtt_subscriber"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agri-advisory-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: MQTT_BROKER_HOST
        value: ""
      - key: MQTT_BROKER_PORT
        value: "1883"
      - key: MQTT_USERNAME
        value: ""
      - key: MQTT_PASSWORD
        value: ""
      - key: MQTT_TOPIC_PREFIX
        value: "krishimitra/farm"
      - key: MQTT_CLIENT_ID
        value: "krishimitra-backend-worker"
